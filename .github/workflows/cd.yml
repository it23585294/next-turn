name: CD (Azure Web App)

on:
  push:
    branches: ["qa"]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ./src/backend/NextTurn.Api/NextTurn.Api.csproj

      - name: Build
        run: dotnet build ./src/backend/NextTurn.Api/NextTurn.Api.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish ./src/backend/NextTurn.Api/NextTurn.Api.csproj -c Release -o publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: nextturn
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish