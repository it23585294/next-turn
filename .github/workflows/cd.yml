- name: Publish
run: dotnet publish ./src/backend/NextTurn.Api/NextTurn.Api.csproj -c Release -o ./publish

- name: Zip publish output
run: |
  cd publish
  zip -r ../publish.zip .
  cd ..

- name: Deploy to Azure Web App
uses: azure/webapps-deploy@v3
with:
  app-name: nextturn
  publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
  package: ./publish.zip