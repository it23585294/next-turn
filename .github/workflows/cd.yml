name: CD (Deploy to Azure)

on:
  push:
    branches: ["qa"]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ./src/backend/NextTurn.Api/NextTurn.Api.csproj

      - name: Build
        run: dotnet build ./src/backend/NextTurn.Api/NextTurn.Api.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish ./src/backend/NextTurn.Api/NextTurn.Api.csproj -c Release -o publish

      - name: Zip publish output
        run: |
          cd publish
          zip -r ../publish.zip .
          cd ..

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: nextturn
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish.zip