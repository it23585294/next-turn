name: CI (.NET)

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ./src/backend/NextTurn.Api/NextTurn.Api.csproj

      - name: Build
        run: dotnet build ./src/backend/NextTurn.Api/NextTurn.Api.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test ./src/backend/NextTurn.Api/NextTurn.Api.csproj --configuration Release --no-build